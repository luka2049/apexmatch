server:
  port: 8080

spring:
  application:
    name: apexmatch-gateway

# =============================================
# 撮合引擎配置
# =============================================
apexmatch:
  engine:
    # 引擎类型：java（默认）| rust
    type: java
    # Rust 引擎动态库路径（仅 type=rust 时需要）
    # macOS:  /path/to/libapexmatch_engine_rs.dylib
    # Linux:  /path/to/libapexmatch_engine_rs.so
    rust-library-path: ${APEXMATCH_RUST_LIB_PATH:./libapexmatch_engine_rs.dylib}
    # 启动时初始化的交易对列表
    symbols:
      - BTC-USDT
      - ETH-USDT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.apexmatch: INFO
    org.springframework.web.socket: INFO
